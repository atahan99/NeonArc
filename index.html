<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NEONARC</title>
<style>
  /* ============================================================
     NEONARC - cyberpunk neon terminal arcade
     Theme: dark purple/black bg, neon cyan/magenta/purple/green
     ============================================================ */
  :root {
    --bg: #07030f;
    --bg2: #0d0620;
    --cyan: #00f0ff;
    --magenta: #ff2bd6;
    --purple: #a45bff;
    --green: #3dff9a;
    --amber: #ffd166;
    --red: #ff5470;
    --text: #b9ffd8;
    --dim: #6a7f8f;
  }

  * { box-sizing: border-box; }

  html, body {
    height: 100%;
    margin: 0;
  }

  body {
    background:
      radial-gradient(1200px 700px at 70% -10%, rgba(164,91,255,0.18), transparent 60%),
      radial-gradient(900px 600px at 0% 110%, rgba(0,240,255,0.12), transparent 55%),
      var(--bg);
    color: var(--green);
    font-family: ui-monospace, "SFMono-Regular", "Menlo", "Consolas", "Liberation Mono", monospace;
    font-size: 15px;
    line-height: 1.35;
    overflow: hidden;
  }

  /* CRT flicker over the whole app */
  #app {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    padding: 14px;
    gap: 10px;
    animation: crtFlicker 6s infinite steps(60);
  }

  @keyframes crtFlicker {
    0%, 100% { opacity: 1; }
    47% { opacity: 0.99; }
    48% { opacity: 0.93; }
    49% { opacity: 1; }
    92% { opacity: 0.97; }
    93% { opacity: 1; }
  }

  /* Scanline overlay */
  .scanlines {
    pointer-events: none;
    position: fixed;
    inset: 0;
    z-index: 50;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0) 0px,
      rgba(0,0,0,0) 2px,
      rgba(0,0,0,0.16) 3px,
      rgba(0,0,0,0) 4px
    );
    mix-blend-mode: overlay;
  }
  .scanlines::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(120% 120% at 50% 50%, transparent 60%, rgba(0,0,0,0.5) 100%);
  }

  header.topbar {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    border: 1px solid var(--cyan);
    border-radius: 8px;
    padding: 8px 14px;
    background: linear-gradient(180deg, rgba(0,240,255,0.06), rgba(0,0,0,0));
    box-shadow: 0 0 12px rgba(0,240,255,0.25), inset 0 0 18px rgba(0,240,255,0.06);
  }
  header.topbar .brand {
    font-weight: 700;
    letter-spacing: 6px;
    font-size: 22px;
    color: var(--cyan);
    text-shadow: 0 0 8px var(--cyan), 0 0 20px rgba(0,240,255,0.6);
  }
  header.topbar .topright {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  header.topbar .tag {
    color: var(--magenta);
    letter-spacing: 2px;
    font-size: 12px;
    text-shadow: 0 0 8px rgba(255,43,214,0.7);
  }
  header.topbar .ghlink {
    display: inline-flex;
    align-items: center;
    color: var(--cyan);
    filter: drop-shadow(0 0 6px rgba(0,240,255,0.5));
    transition: color 0.15s ease, filter 0.15s ease, transform 0.15s ease;
  }
  header.topbar .ghlink:hover {
    color: #fff;
    filter: drop-shadow(0 0 10px rgba(0,240,255,0.9));
    transform: translateY(-1px);
  }

  main {
    flex: 1;
    display: flex;
    gap: 10px;
    min-height: 0;
  }

  /* Terminal output */
  #terminal {
    flex: 1;
    min-width: 0;
    overflow-y: auto;
    border: 1px solid var(--magenta);
    border-radius: 8px;
    padding: 12px 14px;
    background: linear-gradient(180deg, rgba(255,43,214,0.05), rgba(0,0,0,0.2));
    box-shadow: 0 0 12px rgba(255,43,214,0.18), inset 0 0 22px rgba(0,0,0,0.5);
    white-space: pre-wrap;
    word-break: break-word;
  }
  #terminal .line { text-shadow: 0 0 6px rgba(61,255,154,0.45); }
  .c { color: var(--cyan); text-shadow: 0 0 8px rgba(0,240,255,0.6); }
  .m { color: var(--magenta); text-shadow: 0 0 8px rgba(255,43,214,0.6); }
  .p { color: var(--purple); text-shadow: 0 0 8px rgba(164,91,255,0.6); }
  .g { color: var(--green); }
  .y { color: var(--amber); text-shadow: 0 0 8px rgba(255,209,102,0.6); }
  .r { color: var(--red); text-shadow: 0 0 8px rgba(255,84,112,0.6); }
  .dim { color: var(--dim); text-shadow: none; }
  .echo { color: var(--purple); }

  /* Game viewport */
  #viewport {
    width: 50%;
    min-width: 0;
    display: none;
    border: 1px solid var(--purple);
    border-radius: 8px;
    padding: 10px 12px;
    background: linear-gradient(180deg, rgba(164,91,255,0.06), rgba(0,0,0,0.25));
    box-shadow: 0 0 14px rgba(164,91,255,0.25), inset 0 0 22px rgba(0,0,0,0.5);
    overflow: auto;
  }
  #viewport.active {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Draggable splitter between terminal and viewport */
  .splitter {
    display: none;
    flex: 0 0 8px;
    align-self: stretch;
    cursor: col-resize;
    border-radius: 6px;
    background: linear-gradient(180deg, rgba(0,240,255,0.3), rgba(255,43,214,0.3));
    box-shadow: 0 0 8px rgba(0,240,255,0.3);
    transition: background 0.15s ease, box-shadow 0.15s ease;
  }
  .splitter.active { display: block; }
  .splitter:hover,
  .splitter.dragging {
    background: linear-gradient(180deg, rgba(0,240,255,0.7), rgba(255,43,214,0.7));
    box-shadow: 0 0 14px rgba(0,240,255,0.6);
  }
  #screen {
    margin: 0;
    white-space: pre;
    font-family: inherit;
    color: var(--green);
    text-shadow: 0 0 8px rgba(61,255,154,0.5);
    font-size: clamp(11px, 1.6vw, 16px);
    line-height: 1.2;
  }
  #screen .hi { color: var(--cyan); text-shadow: 0 0 8px var(--cyan); }

  /* Input row */
  .inputrow {
    display: flex;
    align-items: center;
    gap: 8px;
    border: 1px solid var(--cyan);
    border-radius: 8px;
    padding: 8px 12px;
    background: rgba(0,240,255,0.04);
    box-shadow: 0 0 10px rgba(0,240,255,0.18);
  }
  .prompt { color: var(--cyan); text-shadow: 0 0 8px var(--cyan); font-weight: 700; }
  #cmd {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--green);
    font-family: inherit;
    font-size: 15px;
    text-shadow: 0 0 6px rgba(61,255,154,0.5);
    caret-color: var(--green);
  }
  .cursor {
    width: 10px;
    height: 18px;
    background: var(--green);
    box-shadow: 0 0 10px var(--green);
    animation: blink 1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .inputrow:focus-within .cursor { display: none; }

  /* Status bar */
  .status {
    border: 1px solid var(--green);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12.5px;
    letter-spacing: 1px;
    color: var(--green);
    background: rgba(61,255,154,0.05);
    box-shadow: 0 0 10px rgba(61,255,154,0.15);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .status b { color: var(--cyan); }

  /* Scrollbars */
  #terminal::-webkit-scrollbar, #viewport::-webkit-scrollbar { width: 8px; }
  #terminal::-webkit-scrollbar-thumb, #viewport::-webkit-scrollbar-thumb {
    background: rgba(0,240,255,0.4); border-radius: 8px;
  }

  @media (max-width: 720px) {
    main { flex-direction: column; }
    #viewport { width: 100%; max-width: 100%; }
    .splitter { display: none !important; }
    header.topbar .tag { display: none; }
  }
</style>
</head>
<body>
  <div id="app">
    <header class="topbar">
      <span class="brand">NEONARC</span>
      <div class="topright">
        <span class="tag">// CYBERDECK TERMINAL ARCADE</span>
        <a class="ghlink" href="https://github.com/atahan99/NeonArc" target="_blank"
           rel="noopener noreferrer" aria-label="View source on GitHub" title="View on GitHub">
          <svg viewBox="0 0 16 16" width="24" height="24" fill="currentColor" aria-hidden="true">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
          </svg>
        </a>
      </div>
    </header>

    <main>
      <div id="terminal" aria-live="polite"></div>
      <div id="splitter" class="splitter" title="Drag to resize"></div>
      <div id="viewport"><pre id="screen"></pre></div>
    </main>

    <div class="inputrow">
      <span class="prompt">&gt;</span>
      <input id="cmd" type="text" autocomplete="off" autocapitalize="off"
             autocorrect="off" spellcheck="false" aria-label="terminal command input" />
      <span class="cursor"></span>
    </div>

    <div id="status" class="status"></div>
  </div>
  <div class="scanlines"></div>

<script>
/* ============================================================
   NEONARC
   - shell: boot, output, command parsing, mode switching, status
   - GAMES: registry of self-contained mini-games
   ============================================================ */
(function () {
  "use strict";

  // ---------- DOM ----------
  var terminalEl = document.getElementById("terminal");
  var viewportEl = document.getElementById("viewport");
  var screenEl = document.getElementById("screen");
  var inputEl = document.getElementById("cmd");
  var statusEl = document.getElementById("status");
  var splitterEl = document.getElementById("splitter");
  var mainEl = document.querySelector("main");

  // ---------- helpers ----------
  function print(text, cls) {
    var lines = String(text).split("\n");
    for (var i = 0; i < lines.length; i++) {
      var div = document.createElement("div");
      div.className = "line" + (cls ? " " + cls : "");
      div.textContent = lines[i].length ? lines[i] : "\u200b";
      terminalEl.appendChild(div);
    }
    terminalEl.scrollTop = terminalEl.scrollHeight;
  }
  function clearTerminal() { terminalEl.innerHTML = ""; }
  function setScreen(text) { screenEl.textContent = text; }
  function setScreenHTML(html) { screenEl.innerHTML = html; }
  function escHTML(s) {
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }
  function center(s, w) {
    s = String(s);
    if (s.length >= w) return s;
    var total = w - s.length;
    var left = Math.floor(total / 2);
    return " ".repeat(left) + s + " ".repeat(total - left);
  }
  function load(key, def) {
    try { var v = localStorage.getItem(key); return v === null ? def : Number(v); }
    catch (e) { return def; }
  }
  function save(key, val) { try { localStorage.setItem(key, String(val)); } catch (e) {} }

  // ---------- shell state ----------
  var shell = {
    mode: "menu",       // "menu" | "game"
    activeGame: null,
    booted: false
  };

  var MENU_ORDER = ["snake", "tetris", "sudoku", "hanoi", "minesweeper", "2048", "hangman", "tictactoe"];
  var TOOL_ORDER = ["cmatrix", "cowsay", "pipes", "lolcat", "sl"];

  var NAME_TO_ID = {
    "1": "snake", "2": "tetris", "3": "sudoku", "4": "hanoi",
    "5": "minesweeper", "6": "2048", "7": "hangman", "8": "tictactoe",
    "9": "cmatrix", "10": "cowsay", "11": "pipes", "12": "lolcat", "13": "sl",
    "snake": "snake",
    "tetris": "tetris",
    "sudoku": "sudoku",
    "hanoi": "hanoi", "tower of hanoi": "hanoi",
    "minesweeper": "minesweeper", "mines": "minesweeper",
    "2048": "2048",
    "hangman": "hangman",
    "tictactoe": "tictactoe", "tic-tac-toe": "tictactoe", "tic tac toe": "tictactoe",
    "ttt": "tictactoe", "xo": "tictactoe", "noughts": "tictactoe",
    "cmatrix": "cmatrix", "matrix": "cmatrix",
    "cowsay": "cowsay", "cow": "cowsay",
    "pipes": "pipes",
    "lolcat": "lolcat", "rainbow": "lolcat",
    "sl": "sl", "train": "sl", "steam": "sl", "locomotive": "sl"
  };

  // combined lookup: games + tools share the same item interface
  function getItem(id) { return GAMES[id] || TOOLS[id]; }
  function padLabel(n) { return ("[" + n + "]").padEnd(4, " "); }

  // ---------- menu / status ----------
  function showMenu() {
    print("");
    print("NEONARC", "c");
    print("");
    print("Choose a game:");
    print("");
    for (var i = 0; i < MENU_ORDER.length; i++) {
      print(padLabel(i + 1) + " " + GAMES[MENU_ORDER[i]].name, "g");
    }
    print("");
    print("Linux tools:", "m");
    print("");
    for (var j = 0; j < TOOL_ORDER.length; j++) {
      print(padLabel(MENU_ORDER.length + j + 1) + " " + TOOLS[TOOL_ORDER[j]].name, "p");
    }
    print("");
    print("Type a number, a name, or help.", "dim");
    print("");
  }

  function updateStatus() {
    if (shell.mode === "game" && shell.activeGame) {
      var g = shell.activeGame;
      var label = g.kind === "tool" ? "TOOL" : "GAME";
      var info = typeof g.statusText === "function" ? g.statusText() : "";
      statusEl.innerHTML =
        "MODE: <b>" + label + "</b> | ACTIVE: <b>" + g.name + "</b>" +
        (info ? " | " + info : "") +
        " | COMMANDS: restart, quit";
    } else {
      statusEl.innerHTML = "MODE: <b>MENU</b> | COMMANDS: help, list, tools, play &lt;name&gt;";
    }
  }

  // ---------- mode switching ----------
  function launchGame(id) {
    var g = getItem(id);
    if (!g) { print("Game not found. Type list to see available games.", "r"); return; }
    if (shell.activeGame && shell.activeGame !== g && shell.activeGame.stop) {
      shell.activeGame.stop();
    }
    shell.mode = "game";
    shell.activeGame = g;
    viewportEl.classList.add("active");
    splitterEl.classList.add("active");
    // reset to the default equal (50/50) split on each launch
    viewportEl.style.width = "";
    viewportEl.style.maxWidth = "";
    clearTerminal();
    print("Launching " + g.name + "...", "c");
    g.start();
    updateStatus();
    focusInput();
  }

  function quitToMenu() {
    if (shell.mode !== "game" || !shell.activeGame) {
      print("No active game. You are already in the menu.", "dim");
      return;
    }
    if (shell.activeGame.stop) shell.activeGame.stop();
    shell.activeGame = null;
    shell.mode = "menu";
    viewportEl.classList.remove("active");
    splitterEl.classList.remove("active");
    setScreen("");
    clearTerminal();
    showMenu();
    updateStatus();
    focusInput();
  }

  // ---------- command handling ----------
  var HELP_TEXT = [
    "Available commands:",
    "  help              show this help",
    "  list              show all games and tools",
    "  tools             show the Linux tools",
    "  menu              return to the main menu",
    "  clear             clear the terminal output",
    "  about             about NEONARC",
    "  quit              exit current game/tool, back to menu",
    "  restart           restart the current game/tool",
    "  play <name>       launch a game or tool (e.g. play cmatrix)",
    "",
    "Quick launch: type a number 1-12 or a name.",
    "Controls are shown when a game or tool starts."
  ].join("\n");

  var ABOUT_TEXT = [
    "NEONARC // cyberpunk terminal arcade",
    "A compact neon cyberdeck running seven classic mini-games",
    "plus a handful of retro Linux terminal toys, all inside a",
    "single self-contained terminal. No installs, no clutter.",
    "Type a number or name to jack in.",
    "Best scores are saved locally on this machine."
  ].join("\n");

  function listGames() {
    print("Games:", "c");
    for (var i = 0; i < MENU_ORDER.length; i++) {
      var g = GAMES[MENU_ORDER[i]];
      print("  " + padLabel(i + 1) + " " + g.name + " - " + g.description, "g");
    }
    print("");
    listTools();
  }

  function listTools() {
    print("Linux tools:", "m");
    for (var j = 0; j < TOOL_ORDER.length; j++) {
      var t = TOOLS[TOOL_ORDER[j]];
      print("  " + padLabel(MENU_ORDER.length + j + 1) + " " + t.name + " - " + t.description, "p");
    }
  }

  function submitCommand(raw) {
    var original = raw;
    var cmd = raw.trim();
    if (cmd === "") return;

    print("> " + original, "echo");

    var lower = cmd.toLowerCase();
    var parts = lower.split(/\s+/);
    var head = parts[0];

    // ----- global commands (always available) -----
    switch (head) {
      case "help": print(HELP_TEXT); return;
      case "about": print(ABOUT_TEXT, "p"); return;
      case "clear": clearTerminal(); return;
      case "list": listGames(); return;
      case "tools": listTools(); return;
      case "menu": quitToMenu(); return;
      case "quit":
      case "exit": quitToMenu(); return;
      case "restart":
        if (shell.mode === "game" && shell.activeGame) {
          var arg = parts.slice(1).join(" ");
          shell.activeGame.restart(arg);
          updateStatus();
        } else {
          print("No active game to restart. Pick one from the menu.", "dim");
        }
        return;
      case "play":
        var target = lower.slice(4).trim();
        if (!target) { print("Usage: play <name>. Try: play snake or play cmatrix", "y"); return; }
        if (NAME_TO_ID[target]) { launchGame(NAME_TO_ID[target]); }
        else { print("Game not found. Type list to see available games.", "r"); }
        return;
    }

    // ----- in-game custom command (hanoi moves, hangman guesses, cowsay/lolcat text) -----
    if (shell.mode === "game" && shell.activeGame && shell.activeGame.handleCommand) {
      if (shell.activeGame.handleCommand(cmd) === true) { updateStatus(); return; }
    }

    // ----- launch by number / name -----
    if (NAME_TO_ID[lower]) { launchGame(NAME_TO_ID[lower]); return; }

    // ----- unknown -----
    print("Unknown command. Type help for available commands.", "r");
  }

  // ---------- keyboard ----------
  var ARROWS = { ArrowUp: 1, ArrowDown: 1, ArrowLeft: 1, ArrowRight: 1 };

  function focusInput() { inputEl.focus(); }

  inputEl.addEventListener("keydown", function (e) {
    var g = shell.activeGame;

    if (shell.mode === "game" && g && g.handleKey) {
      // arrows always route to the game (and never scroll)
      if (ARROWS[e.key]) {
        e.preventDefault();
        g.handleKey(e);
        updateStatus();
        return;
      }
      if (e.key === "Enter") {
        // empty line + Enter -> let game use it (minesweeper reveal), else submit
        if (inputEl.value.trim() === "") {
          if (g.handleKey(e) === true) { e.preventDefault(); updateStatus(); return; }
          e.preventDefault();
          return;
        }
        // fall through to submit non-empty command
      } else if (inputEl.value === "") {
        // single-key controls only when not composing a command
        if (g.handleKey(e) === true) { e.preventDefault(); updateStatus(); return; }
      }
    }

    if (e.key === "Enter") {
      e.preventDefault();
      var val = inputEl.value;
      inputEl.value = "";
      submitCommand(val);
    }
  });

  // keep the terminal focused for keyboard play
  document.addEventListener("mousedown", function (e) {
    if (e.target !== inputEl && e.target !== splitterEl) {
      setTimeout(focusInput, 0);
    }
  });
  window.addEventListener("focus", focusInput);

  // keep the status bar live for real-time games (score updates on a timer)
  setInterval(function () { if (shell.mode === "game") updateStatus(); }, 250);

  // ---------- draggable splitter (resize terminal / viewport) ----------
  (function initSplitter() {
    var dragging = false;
    var MIN = 220; // min px width for each panel
    splitterEl.addEventListener("pointerdown", function (e) {
      if (!splitterEl.classList.contains("active")) return;
      dragging = true;
      splitterEl.classList.add("dragging");
      try { splitterEl.setPointerCapture(e.pointerId); } catch (_) {}
      e.preventDefault();
    });
    splitterEl.addEventListener("pointermove", function (e) {
      if (!dragging) return;
      var rect = mainEl.getBoundingClientRect();
      var vw = rect.right - e.clientX;
      var max = rect.width - MIN;
      vw = Math.max(MIN, Math.min(max, vw));
      viewportEl.style.width = vw + "px";
      viewportEl.style.maxWidth = "none";
    });
    function endDrag(e) {
      if (!dragging) return;
      dragging = false;
      splitterEl.classList.remove("dragging");
      try { splitterEl.releasePointerCapture(e.pointerId); } catch (_) {}
      focusInput();
    }
    splitterEl.addEventListener("pointerup", endDrag);
    splitterEl.addEventListener("pointercancel", endDrag);
  })();

  /* ============================================================
     GAME REGISTRY
     ============================================================ */
  var GAMES = {};

  /* ---------------- SNAKE ---------------- */
  GAMES.snake = (function () {
    var W = 24, H = 15;
    var BEST_KEY = "neonarc.snake.best";
    var snake, dir, nextDir, food, score, best, over, timer, started;

    function place() {
      while (true) {
        var f = { x: (Math.random() * W) | 0, y: (Math.random() * H) | 0 };
        var hit = false;
        for (var i = 0; i < snake.length; i++)
          if (snake[i].x === f.x && snake[i].y === f.y) { hit = true; break; }
        if (!hit) return f;
      }
    }
    function reset() {
      snake = [{ x: 8, y: 7 }, { x: 7, y: 7 }, { x: 6, y: 7 }];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      food = place();
      score = 0;
      over = false;
      best = load(BEST_KEY, 0);

  GAMES["2048"] = (function () {
    var BEST_KEY = "neonarc.2048.best";
    var N = 4;

    function reset() {
      grid = [];
      for (var i = 0; i < N * N; i++) grid.push(0);
      score = 0; over = false; won = false;
      best = load(BEST_KEY, 0);
      addTile(); addTile();
    }
    function empties() {
      var e = [];
      for (var i = 0; i < grid.length; i++) if (grid[i] === 0) e.push(i);
      return e;
    }
    function addTile() {
      var e = empties();
      if (!e.length) return;
      var i = e[(Math.random() * e.length) | 0];
      grid[i] = Math.random() < 0.9 ? 2 : 4;
    }
    function slide(arr) {
      var a = arr.filter(function (v) { return v !== 0; });
      var gained = 0;
      for (var i = 0; i < a.length - 1; i++) {
        if (a[i] === a[i + 1]) {
          a[i] *= 2; gained += a[i];
          if (a[i] === 2048) won = true;
          a.splice(i + 1, 1);
        }
      }
      while (a.length < N) a.push(0);
      return { row: a, gained: gained };
    }
    function getLine(dir, k) {
      var line = [];
      for (var i = 0; i < N; i++) {
        if (dir === "left" || dir === "right") line.push(grid[k * N + i]);
        else line.push(grid[i * N + k]);
      }
      if (dir === "right" || dir === "down") line.reverse();
      return line;
    }
    function setLine(dir, k, line) {
      var l = line.slice();
      if (dir === "right" || dir === "down") l.reverse();
      for (var i = 0; i < N; i++) {
        if (dir === "left" || dir === "right") grid[k * N + i] = l[i];
        else grid[i * N + k] = l[i];
      }
    }
    function move(dir) {
      if (over) return;
      var moved = false;
      for (var k = 0; k < N; k++) {
        var before = getLine(dir, k);
        var res = slide(before.slice());
        score += res.gained;
        var changed = res.row.some(function (v, i) { return v !== before[i]; });
        if (changed) moved = true;
        setLine(dir, k, res.row);
      }
      if (moved) {
        addTile();
        if (score > best) { best = score; save(BEST_KEY, best); }
        render();
        if (won) { print("2048 tile reached! You can keep going.", "y"); won = false; }
        if (!canMove()) endGame();
      }
    }
    function canMove() {
      if (empties().length) return true;
      for (var r = 0; r < N; r++)
        for (var c = 0; c < N; c++) {
          var v = grid[r * N + c];
          if (c < N - 1 && grid[r * N + c + 1] === v) return true;
          if (r < N - 1 && grid[(r + 1) * N + c] === v) return true;
        }
      return false;
    }
    function endGame() {
      over = true;
      if (score > best) { best = score; save(BEST_KEY, best); }
      render();
      print("GAME OVER - 2048. Score: " + score + " | Best: " + best, "r");
      print("Type restart to play again, or quit for the menu.", "dim");

      2: "#00f0ff", 4: "#3dff9a", 8: "#ffd166", 16: "#ff9f45",

      512: "#00ffc8", 1024: "#ffe066", 2048: "#ff3860"

      if (v === 0) return center(".", CW);

      var col = TILE_COLORS[v] || "#ff2bd6";
      return " ".repeat(left) +
        '<span style="color:' + col + ';text-shadow:0 0 8px ' + col + '">' + s + "</span>" +
        " ".repeat(right);
    }
    function render() {
      var sep = "+" + ("-".repeat(CW) + "+").repeat(N);
      var out = sep + "\n";
      for (var r = 0; r < N; r++) {
        var line = "|";
        for (var c = 0; c < N; c++) {
          line += cellHTML(grid[r * N + c]) + "|";
        }
        out += line + "\n" + sep + "\n";
      }
      out += "\nScore: " + score + "   Best: " + best + "\n";
      if (over) out += "\n  >> GAME OVER <<\n";
      setScreenHTML(out);
    }
    return {
      id: "2048", name: "2048", description: "Merge tiles to reach 2048.",
      start: function () {
        reset(); render();
        print("2048 // combine matching tiles. Reach the 2048 tile.", "c");
        print("Controls: Arrows/WASD = move tiles | restart | quit", "dim");
      },
      stop: function () {},
      restart: function () { reset(); render(); print("2048 restarted.", "m"); },
      render: render,
      update: function () {},
      handleKey: function (e) {

        if (e.key === "ArrowLeft" || k === "a") { move("left"); return true; }
        if (e.key === "ArrowRight" || k === "d") { move("right"); return true; }

      for (var i = 0; i < WIN_LINES.length; i++) {

      start: function () {
        reset(); render();
        print("pipes // neon conduits snaking across the deck.", "c");
        print("Controls: just watch | restart | quit", "dim");
        clearInterval(timer); timer = setInterval(tick, 70);
      },
      stop: function () { clearInterval(timer); timer = null; },
      restart: function () { this.stop(); reset(); render(); clearInterval(timer); timer = setInterval(tick, 70); },
      render: render,
      update: tick,
      handleKey: function () { return false; }
    };
  })();

  /* ---------------- LOLCAT ---------------- */
  TOOLS.lolcat = (function () {
    var text, offset, timer;
    var DEFAULT = ["NEONARC", "rainbow terminal filter", "type any text to colorize it"];
    function render() {
      var lines = Array.isArray(text) ? text : String(text).split("\n");
      var out = "";
      var i = 0;
      for (var li = 0; li < lines.length; li++) {
        var line = lines[li];
        for (var c = 0; c < line.length; c++) {
          var chr = line[c];
          if (chr === " ") { out += " "; i++; continue; }
          var hue = (i * 12 + offset) % 360;
          var col = "hsl(" + hue + ",100%,65%)";
          out += '<span style="color:' + col + ';text-shadow:0 0 6px ' + col + '">' + escHTML(chr) + "</span>";
          i++;
        }
        out += "\n";
        i += 6;
      }
      setScreenHTML(out);
    }
    function tick() { offset = (offset + 12) % 360; render(); }
    return {
      id: "lolcat", name: "lolcat", description: "Rainbow-colored text.", kind: "tool",
      start: function () {
        text = DEFAULT; offset = 0; render();
        print("lolcat // everything is better in rainbow.", "c");
        print("Controls: type text = colorize it | restart | quit", "dim");
        clearInterval(timer); timer = setInterval(tick, 110);
      },
      stop: function () { clearInterval(timer); timer = null; },
      restart: function () { text = DEFAULT; offset = 0; render(); print("lolcat reset.", "m"); },
      render: render,
      update: tick,
      handleKey: function () { return false; },
      handleCommand: function (cmd) {
        if (!cmd) return false;
        text = [cmd]; render();
        return true;
      }
    };
  })();

  /* ---------------- SL (steam locomotive) ---------------- */
  TOOLS.sl = (function () {
    var W = 46, offset, timer, gone;
    var TRAIN = [
      "      ====        ____",
      "  ___|[]|_______|    |___",
      " |___________________|__|]",
      " |   NEONARC  o   o     ||",
      " |_____________________ ||",
      "   (O)==(O)     (O)==(O) "
    ];
    var TW = 0;
    for (var t = 0; t < TRAIN.length; t++) TW = Math.max(TW, TRAIN[t].length);
    function render() {
      var out = "";
      for (var r = 0; r < TRAIN.length; r++) {
        var buf = new Array(W).fill(" ");
        var line = TRAIN[r];
        for (var i = 0; i < line.length; i++) {
          var col = offset + i;
          if (col >= 0 && col < W) buf[col] = line[i];
        }
        out += '<span style="color:#ffd166;text-shadow:0 0 6px #ffd166">' + escHTML(buf.join("")) + "</span>\n";
      }
      out += "\n";
      if (gone) {
        var msg = ["The train has departed.", "Type restart to run it again."];
        for (var m = 0; m < msg.length; m++) out += center(msg[m], W) + "\n";
      }
      setScreenHTML(out);
    }
    function tick() {
      offset -= 1;
      if (offset < -TW) { gone = true; clearInterval(timer); timer = null; }
      render();
    }
    function reset() { offset = W; gone = false; }
    return {
      id: "sl", name: "sl", description: "A steam locomotive rolls by.", kind: "tool",
      start: function () {
        reset(); render();
        print("sl // steam locomotive incoming. All aboard!", "c");
        print("Controls: watch it roll | restart | quit", "dim");
        clearInterval(timer); timer = setInterval(tick, 90);
      },
      stop: function () { clearInterval(timer); timer = null; },
      restart: function () { this.stop(); reset(); render(); clearInterval(timer); timer = setInterval(tick, 90); },
      render: render,
      update: tick,
      handleKey: function () { return false; }
    };
  })();

  /* ============================================================
     BOOT SEQUENCE
     ============================================================ */
  var BOOT_LINES = [
    { t: "Initializing Neonarc...", c: "c" },
    { t: "Loading terminal shell...", c: "p" },
    { t: "Calibrating neon grid...", c: "m" },
    { t: "Cyberdeck online.", c: "g" }
  ];

  function boot() {
    updateStatus();
    var i = 0;
    (function next() {
      if (i < BOOT_LINES.length) {
        print(BOOT_LINES[i].t, BOOT_LINES[i].c);
        i++;
        setTimeout(next, 420);
      } else {
        shell.booted = true;
        showMenu();
        focusInput();
      }
    })();
  }

  // GAMES is fully populated above; safe to boot now.
  focusInput();
  boot();
})();
</script>
